# Hyperparameter sweep configuration
#
# Two modes are supported:
#
# 1. Grid search: Define parameter lists under "grid". All combinations will be generated.
#    grid:
#      SAM_LORA_LR: [0.001, 0.0005]
#      SAM_LORA_RANK: [4, 8]
#    This produces 4 runs: (0.001, 4), (0.001, 8), (0.0005, 4), (0.0005, 8)
#
# 2. Explicit runs: Define each run's overrides under "runs".
#    runs:
#      - SAM_LORA_LR: 0.001
#        SAM_LORA_RANK: 4
#      - SAM_LORA_LR: 0.0005
#        SAM_LORA_RANK: 8
#
# If both "grid" and "runs" are specified, "runs" takes precedence.
# Any parameter not listed here uses the default from .env.

runs:
  # topological loss + BCE
  - SAM_LORA_BCE_LOSS_WEIGHT: 0.5
    SAM_LORA_TOPOLOGICAL_LOSS_WEIGHT: 0.5
    SAM_LORA_FOCAL_LOSS_WEIGHT: 0.0
    SAM_LORA_DICE_LOSS_WEIGHT: 0.0
    SAM_LORA_CL_DICE_LOSS_WEIGHT: 0.0
    SAM_LORA_SKELETON_RECALL_LOSS_WEIGHT: 0.0
    SAM_LORA_JUNCTION_HEATMAP_WEIGHT_SCALE: 0
    SAM_LORA_JUNCTION_PATCH_WEIGHT: 0.0
  # topological loss + BCE + clDice
  - SAM_LORA_BCE_LOSS_WEIGHT: 0.5
    SAM_LORA_TOPOLOGICAL_LOSS_WEIGHT: 0.5
    SAM_LORA_CL_DICE_LOSS_WEIGHT: 0.5
    SAM_LORA_CL_DICE_SKELETONIZE_CITERATIONS: 15
    SAM_LORA_FOCAL_LOSS_WEIGHT: 0.0
    SAM_LORA_DICE_LOSS_WEIGHT: 0.0
    SAM_LORA_SKELETON_RECALL_LOSS_WEIGHT: 0.0
    SAM_LORA_JUNCTION_HEATMAP_WEIGHT_SCALE: 0
    SAM_LORA_JUNCTION_PATCH_WEIGHT: 0.0

  # BCE + Dice + clDice
  - SAM_LORA_BCE_LOSS_WEIGHT: 0.25
    SAM_LORA_DICE_LOSS_WEIGHT: 0.5
    SAM_LORA_CL_DICE_LOSS_WEIGHT: 0.5
    SAM_LORA_CL_DICE_SKELETONIZE_CITERATIONS: 15
    SAM_LORA_TOPOLOGICAL_LOSS_WEIGHT: 0.0
    SAM_LORA_FOCAL_LOSS_WEIGHT: 0.0
    SAM_LORA_SKELETON_RECALL_LOSS_WEIGHT: 0.0
    SAM_LORA_JUNCTION_HEATMAP_WEIGHT_SCALE: 0
    SAM_LORA_JUNCTION_PATCH_WEIGHT: 0.0
  # BCE + Dice + Skeleton Recall
  - SAM_LORA_BCE_LOSS_WEIGHT: 0.25
    SAM_LORA_DICE_LOSS_WEIGHT: 0.5
    SAM_LORA_SKELETON_RECALL_LOSS_WEIGHT: 0.5
    SAM_LORA_TOPOLOGICAL_LOSS_WEIGHT: 0.0
    SAM_LORA_FOCAL_LOSS_WEIGHT: 0.0
    SAM_LORA_CL_DICE_LOSS_WEIGHT: 0.0
    SAM_LORA_JUNCTION_HEATMAP_WEIGHT_SCALE: 0
    SAM_LORA_JUNCTION_PATCH_WEIGHT: 0.0
  
  # BCE with heatmap weighting + Dice + clDice
  - SAM_LORA_BCE_LOSS_WEIGHT: 0.25
    SAM_LORA_JUNCTION_HEATMAP_WEIGHT_SCALE: 1000
    SAM_LORA_DICE_LOSS_WEIGHT: 0.5
    SAM_LORA_CL_DICE_LOSS_WEIGHT: 0.5
    SAM_LORA_CL_DICE_SKELETONIZE_CITERATIONS: 15
    SAM_LORA_TOPOLOGICAL_LOSS_WEIGHT: 0.0
    SAM_LORA_FOCAL_LOSS_WEIGHT: 0.0
    SAM_LORA_SKELETON_RECALL_LOSS_WEIGHT: 0.0
    SAM_LORA_JUNCTION_PATCH_WEIGHT: 0.0

  # Focal + Dice + clDice
  - SAM_LORA_FOCAL_LOSS_WEIGHT: 0.25
    SAM_LORA_DICE_LOSS_WEIGHT: 0.5
    SAM_LORA_CL_DICE_LOSS_WEIGHT: 0.5
    SAM_LORA_CL_DICE_SKELETONIZE_CITERATIONS: 15
    SAM_LORA_TOPOLOGICAL_LOSS_WEIGHT: 0.0
    SAM_LORA_BCE_LOSS_WEIGHT: 0.0
    SAM_LORA_SKELETON_RECALL_LOSS_WEIGHT: 0.0
    SAM_LORA_JUNCTION_HEATMAP_WEIGHT_SCALE: 0
    SAM_LORA_JUNCTION_PATCH_WEIGHT: 0.0